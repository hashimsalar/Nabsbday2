<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poetry · Nabeeha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Poppins:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="assets/js/gate.js"></script>
<style>
  /* Urdu / RTL poem styling */
  .poem.rtl{direction:rtl;text-align:right;}
  .poem.rtl h3{font-family:"Noto Nastaliq Urdu",serif;font-size:clamp(1.5rem,4vw,2.1rem);line-height:2.1;}
  .poem.rtl .line{font-family:"Noto Nastaliq Urdu",serif;font-size:clamp(1.1rem,2.8vw,1.5rem);line-height:2.6;color:var(--ink);}
  .poem .poet{font-family:"Noto Nastaliq Urdu",serif;color:var(--rose);font-size:1.2rem;margin-top:18px;line-height:2.2;}
  .poem .src{margin-top:10px;font-size:.85rem;}
  .poem .src a{color:var(--muted);text-decoration:underline;}
  .poem.rtl::before{left:20px;right:auto;}
  /* Bonus: birthday cake */
  .cake-wrap{max-width:520px;margin:0 auto;text-align:center;background:#fff;border-radius:var(--radius);
    padding:clamp(28px,5vw,48px);box-shadow:var(--shadow);border:1px solid rgba(201,162,75,.25);}
  .cake{font-size:4.5rem;line-height:1;position:relative;display:inline-block;cursor:pointer;transition:.2s;}
  .cake:hover{transform:scale(1.05);}
  .flame{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:1.4rem;animation:flick .5s infinite alternate;}
  @keyframes flick{from{opacity:.7;transform:translateX(-50%) scale(.9);}to{opacity:1;transform:translateX(-52%) scale(1.1);}}
  .cake.out .flame{display:none;}
  .wishmsg{margin-top:16px;font-family:var(--serif);font-size:1.4rem;color:var(--rose);min-height:1.4em;}
</style>
</head>
<body data-page="poetry.html">

<header class="section wrap center" style="padding-bottom:16px;">
  <p class="eyebrow fade in">Words that kept escaping me</p>
  <h1 class="fade in" style="font-size:clamp(2.4rem,6vw,4rem);">Poetry</h1>
  <p class="fade in" style="color:var(--muted);max-width:52ch;margin:0 auto;">Some of these are for you. Some are still coming, and we'll keep adding them here.</p>
</header>

<section class="wrap" style="padding-bottom:40px;">
  <div class="poems" id="poems"></div>
</section>

<section class="section wrap">
  <div class="center fade in">
    <p class="eyebrow">One more thing</p>
    <h2>Make a wish</h2>
  </div>
  <div class="cake-wrap fade in">
    <div class="cake" id="cake"><span class="flame" id="flame">🔥</span>🎂</div>
    <p style="color:var(--muted);margin-top:14px;">Tap the cake, close your eyes, and blow out the candle.</p>
    <div class="wishmsg" id="wishmsg"></div>
  </div>
</section>

<footer class="foot">Made with <span class="heart">♥</span> for Nabeeha Ahmed</footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
  // Render poems with a gentle line-by-line reveal
  const container=document.getElementById("poems");
  container.innerHTML=SITE.poems.map(p=>`
    <article class="poem fade ${p.rtl?'rtl':''}" ${p.rtl?'lang="ur" dir="rtl"':''}>
      <h3>${p.title}</h3>
      <div class="lines">${p.lines.map(l=>`<div class="line ${l.trim()===''?'blank':''}" style="opacity:0;transform:translateY(6px);transition:.6s;">${l||"&nbsp;"}</div>`).join("")}</div>
      ${p.poet?`<div class="poet">${p.poet}</div>`:""}
      ${p.author?`<div class="author">${p.author}</div>`:""}
      ${p.source?`<div class="src"><a href="${p.source}" target="_blank" rel="noopener">${p.note||'source'}</a></div>`:(p.note?`<div class="src">${p.note}</div>`:"")}
    </article>`).join("");

  const io=new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("in");
      e.target.querySelectorAll(".line").forEach((ln,i)=>{
        setTimeout(()=>{ln.style.opacity=1;ln.style.transform="none";}, i*180);
      });
      io.unobserve(e.target);
    }
  }),{threshold:.2});
  document.querySelectorAll(".poem").forEach(el=>io.observe(el));

  // Bonus cake
  const cake=document.getElementById("cake"), wishmsg=document.getElementById("wishmsg");
  let blown=false;
  cake.addEventListener("click",()=>{
    if(blown){ cake.classList.remove("out"); wishmsg.textContent=""; blown=false; return; }
    cake.classList.add("out"); blown=true;
    wishmsg.textContent="Wish made. It's already coming true. 💛";
    confettiBurst(240);
  });
</script>
</body>
</html>
