<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery · Nabeeha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="assets/js/gate.js"></script>
</head>
<body data-page="gallery.html">

<header class="section wrap center" style="padding-bottom:24px;">
  <p class="eyebrow fade in">Every version of you</p>
  <h1 class="fade in" style="font-size:clamp(2.4rem,6vw,4rem);">The Gallery</h1>
  <p class="fade in" style="color:var(--muted);max-width:56ch;margin:0 auto;">
    Portraits, our endless video calls, stolen fries, a cat, and a few moments that mattered more than the rest. Tap any photo to open it. ★ marks a spotlight.
  </p>
</header>

<section class="wrap" style="padding-bottom:40px;">
  <div class="gallery" id="gallery"></div>
</section>

<section class="section wrap">
  <div class="center fade">
    <p class="eyebrow">Moving pictures</p>
    <h2>Videos</h2>
    <p style="color:var(--muted);margin-bottom:28px;">Turn your volume up for the singing one. 🎶</p>
  </div>
  <div class="videos fade" id="videos"></div>
</section>

<footer class="foot">Made with <span class="heart">♥</span> for Nabeeha Ahmed</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-x" id="lbClose">×</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" alt="">
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-cap" id="lbCap"></div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
<script>
  const gEl=document.getElementById("gallery");
  gEl.innerHTML = SITE.photos.map((p,i)=>`
    <figure class="tile ${p.span===2?'spotlight':''}" data-i="${i}">
      <img src="assets/photos/thumb/${p.src}.jpg" alt="${p.cap}" loading="lazy">
      <figcaption class="cap">${p.cap}</figcaption>
    </figure>`).join("");
  // re-observe newly added tiles
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.08});
  document.querySelectorAll(".tile").forEach(t=>io.observe(t));

  // Videos
  document.getElementById("videos").innerHTML = SITE.videos.map(v=>`
    <div class="vcard">
      <video controls preload="metadata" poster="assets/videos/${v.src}.jpg">
        <source src="assets/videos/${v.src}.mp4" type="video/mp4">
      </video>
      <div class="vcap">${v.cap}</div>
    </div>`).join("");

  // Lightbox
  const lb=document.getElementById("lightbox"), lbImg=document.getElementById("lbImg"), lbCap=document.getElementById("lbCap");
  let cur=0;
  function show(i){
    cur=(i+SITE.photos.length)%SITE.photos.length;
    const p=SITE.photos[cur];
    lbImg.src="assets/photos/"+p.src+".jpg"; lbCap.textContent=p.cap; lb.classList.add("open");
  }
  gEl.addEventListener("click",e=>{const f=e.target.closest(".tile"); if(f) show(+f.dataset.i);});
  document.getElementById("lbClose").onclick=()=>lb.classList.remove("open");
  document.getElementById("lbNext").onclick=()=>show(cur+1);
  document.getElementById("lbPrev").onclick=()=>show(cur-1);
  lb.addEventListener("click",e=>{if(e.target===lb)lb.classList.remove("open");});
  document.addEventListener("keydown",e=>{
    if(!lb.classList.contains("open"))return;
    if(e.key==="Escape")lb.classList.remove("open");
    if(e.key==="ArrowRight")show(cur+1);
    if(e.key==="ArrowLeft")show(cur-1);
  });
</script>
</body>
</html>
